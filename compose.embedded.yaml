services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_HOME: /app
        PORT: ${PORT:-3000}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      APP_HOME: /app
      PORT: ${PORT:-3000}
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      APP_BASE_URL: ${APP_BASE_URL:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:?TOKEN_ENC_KEY is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EMBEDDED_POSTGRES_HOST: ${EMBEDDED_POSTGRES_HOST:-127.0.0.1}
      EMBEDDED_POSTGRES_PORT: ${EMBEDDED_POSTGRES_PORT:-54329}
      EMBEDDED_POSTGRES_DB: ${EMBEDDED_POSTGRES_DB:-teamcal}
      EMBEDDED_POSTGRES_USER: ${EMBEDDED_POSTGRES_USER:-postgres}
      EMBEDDED_POSTGRES_PASSWORD: ${EMBEDDED_POSTGRES_PASSWORD:-postgres}
      EMBEDDED_POSTGRES_DATA_DIR: /var/lib/team-calendar/postgres
      EMBEDDED_POSTGRES_CREATE_USER: ${EMBEDDED_POSTGRES_CREATE_USER:-false}
      RATE_LIMIT_WINDOW_MIN: ${RATE_LIMIT_WINDOW_MIN:-15}
      RATE_LIMIT_AVAILABILITY_MAX: ${RATE_LIMIT_AVAILABILITY_MAX:-120}
      RATE_LIMIT_BOOKING_MAX: ${RATE_LIMIT_BOOKING_MAX:-30}
      BOOKING_WEBHOOK_DELIVERY_ENABLED: ${BOOKING_WEBHOOK_DELIVERY_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Team Calendar}
    command: ["sh", "-lc", "npm run db:migrate && npm run start"]
    volumes:
      - team-calendar-embedded-data:/var/lib/team-calendar/postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  team-calendar-embedded-data:
    name: team-calendar-embedded-data
