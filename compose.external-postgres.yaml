services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_HOME: ${CONTAINER_APP_HOME:?CONTAINER_APP_HOME is required}
        PORT: ${PORT:?PORT is required}
    restart: unless-stopped
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"
    environment:
      APP_HOME: ${CONTAINER_APP_HOME:?CONTAINER_APP_HOME is required}
      PORT: ${PORT:?PORT is required}
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:?TOKEN_ENC_KEY is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      RATE_LIMIT_WINDOW_MIN: ${RATE_LIMIT_WINDOW_MIN}
      RATE_LIMIT_AVAILABILITY_MAX: ${RATE_LIMIT_AVAILABILITY_MAX}
      RATE_LIMIT_BOOKING_MAX: ${RATE_LIMIT_BOOKING_MAX}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      BOOKING_WEBHOOK_URL: ${BOOKING_WEBHOOK_URL}
      BOOKING_TOKEN: ${BOOKING_TOKEN}
    command: ["sh", "-lc", "npm run db:migrate && npm run start"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
